<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gerador RAT</title>

<style>
body {
    background:#121212;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
}

.container {
    width:420px;
    padding:20px;
}

h2 {
    text-align:center;
}

input, textarea, select {
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:8px;
    background:#2a2a2a;
    color:white;
    border-radius:8px;
    border:1px solid #444;
}

textarea { height:100px; }

.row {
    display:flex;
    gap:10px;
    margin-top:15px;
}

button {
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2f6fa5;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#4a90d6;
}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#222;
    padding:20px;
    border-radius:12px;
    width:300px;
    text-align:center;
}

.modal-buttons {
    display:flex;
    gap:10px;
    margin-top:15px;
}
</style>

<script>

function validar(){

    let campos = [
        "protocolo","titulo","atendente","local","tecnico",
        "gerente","descricao","data","inicio","fim"
    ];

    for(let c of campos){
        let campo = document.querySelector(`[name=${c}]`);
        if(!campo.value){
            alert("Preencha todos os campos obrigatórios");
            return false;
        }
    }

    let i = document.querySelector("[name=inicio]").value;
    let f = document.querySelector("[name=fim]").value;

    function toMin(t){
        let [h,m] = t.split(":");
        return (parseInt(h) * 60) + parseInt(m);
    }

    if(toMin(f) <= toMin(i)){
        alert("Hora fim deve ser maior!");
        return false;
    }

    return true;
}

function abrirModal(){
    document.getElementById("modal").style.display="flex";
}

function fecharModal(){
    document.getElementById("modal").style.display="none";
}

function gerarExcel(){
    let mes = document.getElementById("mes").value;

    if(!mes){
        alert("Selecione o mês!");
        return;
    }

    window.location.href = "/excel?mes=" + mes;
}

/* =========================
   UTIL
========================= */

function getFormData(){
    return new FormData(document.getElementById("formRAT"));
}

function getFileNameFromHeader(res, fallback){
    let disposition = res.headers.get("Content-Disposition");

    if(!disposition) return fallback;

    let match = disposition.match(/filename="?(.+)"?/);
    return match ? match[1] : fallback;
}

/* =========================
   DOC
========================= */

async function gerarDOC(){

    if(!validar()) return;

    mostrarLoading();

    try{
        let res = await fetch("/gerar", {
            method: "POST",
            body: getFormData()
        });

        if(!res.ok){
            alert("Erro ao gerar DOC");
            esconderLoading();
            return;
        }

        let filename = getFileNameFromHeader(res, "RAT.docx");

        let blob = await res.blob();
        let url = URL.createObjectURL(blob);

        let a = document.createElement("a");
        a.href = url;
        a.download = filename;

        document.body.appendChild(a);
        a.click();
        a.remove();

        URL.revokeObjectURL(url);

    } catch(e){
        alert("Erro ao gerar documento");
    }

    esconderLoading();
}

/* =========================
   PDF COM PROGRESSO REAL
========================= */

async function gerarPDF(){

    if(!validar()) return;

    mostrarLoading();

    try{
        let res = await fetch("/pdf/start", {
            method: "POST",
            body: getFormData()
        });

        if(!res.ok){
            alert("Erro ao iniciar PDF");
            esconderLoading();
            return;
        }

        let data = await res.json();

        if(!data.job_id){
            alert("Erro ao iniciar processamento");
            esconderLoading();
            return;
        }

        acompanharProgresso(data.job_id);

    } catch(e){
        alert("Erro ao conectar com servidor");
        esconderLoading();
    }
}

/* =========================
   PROGRESSO REAL
========================= */

async function acompanharProgresso(job_id){

    let interval = setInterval(async () => {

        try{
            let res = await fetch(`/pdf/status/${job_id}`);
            let data = await res.json();

            // ✅ progresso numérico
            if(typeof data.status === "number"){
                document.getElementById("bar").style.width = data.status + "%";
                document.getElementById("statusText").innerText = "Progresso: " + data.status + "%";
            }

            // ✅ FINALIZADO (CORRIGIDO AQUI)
            else if(data.status === "concluido"){
                clearInterval(interval);
                document.getElementById("statusText").innerText = "Baixando PDF...";

                // Pequena folga de 300ms para o sistema respirar e liberamos o download nativo
                setTimeout(async () => {
                    try {
                        let resDownload = await fetch(`/pdf/download/${job_id}`);
                        if(!resDownload.ok) {
                            alert("Erro ao baixar o PDF gerado");
                            esconderLoading();
                            return;
                        }
                        
                        let filename = getFileNameFromHeader(resDownload, "RAT.pdf");
                        let blob = await resDownload.blob();
                        let url = URL.createObjectURL(blob);

                        // Cria um link temporário para forçar o DOWNLOAD real, sem abrir nova aba
                        let a = document.createElement("a");
                        a.href = url;
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();

                        URL.revokeObjectURL(url);
                    } catch(err) {
                        alert("Erro no download do PDF");
                    }
                    esconderLoading();
                }, 300);
            }

            // ✅ ERRO
            else if(typeof data.status === "string" && data.status.startsWith("erro")){
                clearInterval(interval);
                alert(data.status);
                esconderLoading();
            }

        } catch(e){
            clearInterval(interval);
            alert("Erro ao acompanhar progresso");
            esconderLoading();
        }

    }, 1000);
}

/* =========================
   LOADING UI
========================= */

function mostrarLoading(){
    document.getElementById("loading").style.display = "flex";
    desabilitarBotoes(true);

    // reset visual
    let bar = document.getElementById("bar");
    if(bar) bar.style.width = "0%";

    let text = document.getElementById("statusText");
    if(text) text.innerText = "Iniciando...";
}

function esconderLoading(){
    document.getElementById("loading").style.display = "none";
    desabilitarBotoes(false);
}

function desabilitarBotoes(state){
    document.querySelectorAll("button").forEach(btn=>{
        btn.disabled = state;
        btn.style.opacity = state ? "0.5" : "1";
    });
}

</script>


</head>

<body>

<div class="container">

<h2>Gerador RAT</h2>

<form id="formRAT"
      action="/gerar"
      method="post"
      enctype="multipart/form-data"
      onsubmit="return false">

<input name="protocolo" placeholder="Protocolo">
<input name="titulo" placeholder="Título">
<input name="atendente" placeholder="Atendente">

<select name="loja">
<option>ZARA</option>
<option>VIVARA</option>
<option>DALGAS G7</option>
<option>DALGAS Escritório</option>
<option>Clinica CLIMAR</option>
</select>

<input name="local" placeholder="Local">
<input name="tecnico" placeholder="Técnico">
<input type="date" name="data">

<input name="inicio" placeholder="08:00">
<input name="fim" placeholder="09:00">

<input name="gerente" placeholder="Gerente">

<textarea name="descricao" placeholder="Descrição"></textarea>

<input type="file" name="fotos" multiple>

<div class="row">
    <button type="button" onclick="gerarDOC()">Gerar DOC</button>
    <button type="button" onclick="gerarPDF()">Gerar PDF</button>
</div>

<div class="row">
    <button type="button" onclick="abrirModal()">Relatório Mês</button>
    <button type="reset">Reset</button>
</div>

</form>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3>Selecionar Mês</h3>
        <input type="month" id="mes">

        <div class="modal-buttons">
            <button type="button" onclick="gerarExcel()">Gerar</button>
            <button type="button" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>
</div>

</div>

<div id="loading" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;color:white;">
    <div style="width:300px;">
        <div style="background:#444;height:20px;border-radius:10px;">
            <div id="bar" style="background:#4a90d6;width:0%;height:100%;border-radius:10px;"></div>
        </div>
        <p id="statusText">Iniciando...</p>
    </div>
	
</div>
</body>
</html>
