<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gerador RAT</title>

<style>
body {
    background:#121212;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
}

.container {
    width:420px;
    padding:20px;
}

h2 {
    text-align:center;
}

input, textarea, select {
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:8px;
    background:#2a2a2a;
    color:white;
    border-radius:8px;
    border:1px solid #444;
}

textarea {
    height:100px;
}

.row {
    display:flex;
    gap:10px;
    margin-top:15px;
}

button {
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2f6fa5;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#4a90d6;
}

.modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#222;
    padding:20px;
    border-radius:12px;
    width:300px;
    text-align:center;
}

.modal-buttons {
    display:flex;
    gap:10px;
    margin-top:15px;
}
</style>

<script>
function validar(){
    let i=document.querySelector("[name=inicio]").value;
    let f=document.querySelector("[name=fim]").value;

    function toMin(t){
        let [h,m]=t.split(":");
        return h*60 + parseInt(m);
    }

    if(!i || !f || toMin(f) <= toMin(i)){
        alert("Hora fim deve ser maior!");
        return false;
    }
    return true;
}

function abrirModal(){
    document.getElementById("modal").style.display="flex";
}

function fecharModal(){
    document.getElementById("modal").style.display="none";
}

function gerarExcel(){
    let mes = document.getElementById("mes").value;

    if(!mes){
        alert("Selecione o mês!");
        return;
    }

    window.location.href="/excel?mes="+mes;
}

// ✅ GERAR PDF EM NOVA ABA
function gerarPDF(){
    let form = document.getElementById("formRAT");

    form.action = "/pdf";

    // abre nova aba
    form.target = "_blank";

    form.submit();

    // volta ao padrão depois
    form.target = "_self";
    form.action = "/gerar";
}
</script>

</head>

<body>

<div class="container">

<h2>Gerador RAT</h2>

<form id="formRAT" action="/gerar" method="post" enctype="multipart/form-data" onsubmit="return validar()">

<input name="protocolo" placeholder="Protocolo">
<input name="titulo" placeholder="Título">
<input name="atendente" placeholder="Atendente">

<select name="loja">
<option>ZARA</option>
<option>VIVARA</option>
<option>DALGAS G7</option>
<option>DALGAS Escritório</option>
<option>Clinica CLIMAR</option>
</select>

<input name="local" placeholder="Local">
<input name="tecnico" placeholder="Técnico">
<input type="date" name="data">

<input name="inicio" placeholder="08:00">
<input name="fim" placeholder="09:00">

<input name="gerente" placeholder="Gerente">

<textarea name="descricao" placeholder="Descrição"></textarea>

<input type="file" name="fotos" multiple>

<!-- ✅ BOTÕES PRINCIPAIS -->
<div class="row">
    <button type="submit">Gerar</button>
    <button type="button" onclick="abrirModal()">Relatório Mês</button>
</div>

<!-- ✅ BOTÕES SECUNDÁRIOS -->
<div class="row">

    <button type="button" onclick="gerarPDF()">
        Gerar PDF
    </button>

    <button type="reset">Reset</button>

</div>

</form>

<!-- ✅ MODAL -->
<div id="modal" class="modal">

    <div class="modal-box">

        <h3>Selecionar Mês</h3>

        <input type="month" id="mes">

        <div class="modal-buttons">
            <button onclick="gerarExcel()">Gerar</button>
            <button onclick="fecharModal()">Cancelar</button>
        </div>

    </div>

</div>

</div>

</body>
</html>
