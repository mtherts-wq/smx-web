<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SMX - Gerador RAT</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #121212;
    color: white;
    display: flex;
    justify-content: center;
}

.container {
    width: 420px;
    padding: 20px;
}

label { display:block; margin-top:10px; }

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top:5px;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
    border:1px solid #444;
}

textarea { height:100px; }

.row {
    display:flex;
    gap:10px;
    margin-top:15px;
}

button {
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2f6fa5;
    color:white;
}
</style>

<script>
function validar(){
    let i=document.querySelector("[name=inicio]").value;
    let f=document.querySelector("[name=fim]").value;

    function m(t){
        let [h,mi]=t.split(":");
        return h*60 + parseInt(mi);
    }

    if(!i || !f || m(f)<=m(i)){
        alert("Hora fim deve ser maior!");
        return false;
    }
    return true;
}
</script>
</head>

<body>

<div class="container">

<h2>SMX - Gerador RAT</h2>

<form action="/gerar" method="post" enctype="multipart/form-data" onsubmit="return validar()">

<input name="protocolo" placeholder="Protocolo">
<input name="titulo" placeholder="Título">
<input name="atendente" placeholder="Atendente">

<select name="loja">
<option>ZARA</option>
<option>VIVARA</option>
</select>

<input name="local" placeholder="Local">
<input name="tecnico" placeholder="Técnico">
<input type="date" name="data">

<input name="inicio" placeholder="08:00">
<input name="fim" placeholder="09:00">

<input name="gerente" placeholder="Gerente">

<textarea name="descricao" placeholder="Descrição"></textarea>

<input type="file" name="fotos" multiple>

<!-- ✅ BOTÕES -->
<div class="row">
<button type="submit">Gerar</button>
<button type="button" onclick="window.location.href='/excel'"button">Abrir PDF</button>
<button type="reset">Reset</button>
</div>

</form>

</div>

</body>
</html>
