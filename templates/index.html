<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SMX - Gerador RAT</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #1b1b1b;
    color: white;
    display: flex;
    justify-content: center;
}

.container {
    width: 420px;
    padding: 20px;
}

h2 {
    text-align: center;
}

label {
    margin-top: 10px;
    display: block;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #555;
    background-color: #2b2b2b;
    color: white;
}

textarea {
    height: 100px;
}

.row {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background-color: #2f6fa5;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #4a90d6;
}

.reset {
    width: 100%;
    margin-top: 10px;
}
</style>

<script>
function validar() {
    let inicio = document.querySelector("[name=inicio]").value;
    let fim = document.querySelector("[name=fim]").value;

    if (!inicio || !fim) {
        alert("Preencha horário!");
        return false;
    }

    if (fim <= inicio) {
        alert("Hora fim deve ser maior!");
        return false;
    }

    return true;
}
</script>

</head>

<body>

<div class="container">

<h2>SMX - Gerador de Chamado</h2>

<!-- ✅ FORM CORRETO -->
<form action="/gerar" method="post" enctype="multipart/form-data" onsubmit="return validar()">

<label>Protocolo</label>
<input name="protocolo" required>

<label>Título</label>
<input name="titulo" required>

<label>Atendente SMX</label>
<input name="atendente">

<label>Loja</label>
<select name="loja">
<option>ZARA</option>
<option>VIVARA</option>
<option>DALGAS G7</option>
<option>DALGAS Escritório</option>
<option>Clinica CLIMAR</option>
</select>

<label>Local</label>
<input name="local">

<label>Técnico</label>
<input name="tecnico">

<label>Data</label>
<input type="date" name="data" required>

<label>Hora início</label>
<input name="inicio" placeholder="08:00">

<label>Hora fim</label>
<input name="fim" placeholder="09:00">

<label>Gerente</label>
<input name="gerente">

<label>Descrição</label>
<textarea name="descricao"></textarea>

<label>Fotos</label>
<input type="file" name="fotos" multiple>

<!-- ✅ BOTÕES COMPLETOS -->
<div class="row">
    <button type="submit">Gerar</button>
    <button type="button" onclick="window.location.href='/excel'et</button>
</div>

</form>

</div>

</body>
</html>
