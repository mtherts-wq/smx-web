<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SMX - Gerador RAT</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #1b1b1b;
    color: white;
    display: flex;
    justify-content: center;
}

.container {
    width: 420px;
    padding: 20px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #555;
    background-color: #2b2b2b;
    color: white;
}

textarea { height: 100px; }

.row {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background-color: #2f6fa5;
    color: white;
}
</style>

<script>
function validar() {
    let inicio = document.querySelector("[name=inicio]").value;
    let fim = document.querySelector("[name=fim]").value;

    function toMin(h) {
        let [hh, mm] = h.split(":");
        return parseInt(hh)*60 + parseInt(mm);
    }

    if (toMin(fim) <= toMin(inicio)) {
        alert("Hora fim deve ser maior!");
        return false;
    }

    return true;
}
</script>
</head>

<body>

<div class="container">

<h2>SMX - Gerador RAT</h2>

<form action="/gerar" method="post" enctype="multipart/form-data" onsubmit="return validar()">

<input name="protocolo" placeholder="Protocolo">
<input name="titulo" placeholder="Título">
<input name="atendente" placeholder="Atendente">

<select name="loja">
<option>ZARA</option>
<option>VIVARA</option>
<option>DALGAS</option>
</select>

<input name="local" placeholder="Local">
<input name="tecnico" placeholder="Técnico">
<input type="date" name="data">

<input name="inicio" placeholder="08:00">
<input name="fim" placeholder="09:00">

<input name="gerente" placeholder="Gerente">

<textarea name="descricao" placeholder="Descrição"></textarea>

<input type="file" name="fotos" multiple>

<!-- ✅ BOTÕES -->
<div class="row">
<button type="submit">Gerar</button>
<button type="button" onclick="location.href='/excel'Reset</button>
<button type="button">PDF</button>
</div>

</form>

</div>

</body>
</html>
